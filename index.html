<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Jogos - Roda de Vôlei</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0057b7, #ffcc00);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 2.5rem;
      color: #ffcc00;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 20px;
    }

    p {
      font-size: 1rem;
      color: #f0f0f0;
      margin-bottom: 30px;
    }

    a {
      text-decoration: none;
      background-color: #ffcc00;
      color: #0057b7;
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: #0057b7;
      color: #ffcc00;
      transform: scale(1.05);
    }

    .bola {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      animation: flutuar 6s infinite ease-in-out;
    }

    @keyframes flutuar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>@roda_de_volei.mls</h1>
    <h2>Catálogo de Jogos Passa Tempo</h2>
    <p>Chegou o novo <strong>Jogo da Memória</strong>! Teste sua agilidade e divirta-se com as cores do vôlei!</p>
    <a href="https://nvini16.github.io/Vira-cart-o-/?fbclid=PAT01DUAP48VdleHRuA2FlbQIxMABzcnRjBmFwcF9pZA81NjcwNjczNDMzNTI0MjcAAaekPFuqGzLrHSHDbo95-v6PyUtqeykYTClSPT4KK0Xm72vcAKYGrUUogQYFQw_aem_jPFitkPnN5pPYNNmuhh0mQ" target="_blank">Jogar Agora</a>
  </div>

  <script>
    // Cria bolinhas animadas no fundo
    for (let i = 0; i < 10; i++) {
      const bola = document.createElement('div');
      bola.classList.add('bola');
      bola.style.width = `${Math.random() * 80 + 20}px`;
      bola.style.height = bola.style.width;
      bola.style.background = Math.random() > 0.5 ? '#ffcc00' : '#0057b7';
      bola.style.left = `${Math.random() * 100}%`;
      bola.style.top = `${Math.random() * 100}%`;
      bola.style.animationDelay = `${Math.random() * 5}s`;
      document.body.appendChild(bola);
    }
  </script>
</body>
</html>
